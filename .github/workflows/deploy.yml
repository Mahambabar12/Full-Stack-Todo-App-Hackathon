# T-403: Setup GitHub Actions for automated testing and image pushing.
name: Deploy to Kubernetes

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Check out code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.13'

    - name: Install backend dependencies
      run: |
        pip install uv
        cd backend
        uv sync

    - name: Run backend tests
      run: |
        cd backend
        # Add test command here, e.g., pytest

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'

    - name: Install frontend dependencies
      run: |
        cd frontend
        npm ci

    - name: Run frontend tests
      run: |
        cd frontend
        # Add test command here, e.g., npm test

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v2
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push backend image
      uses: docker/build-push-action@v4
      with:
        context: backend
        push: true
        tags: ghcr.io/${{ github.repository }}/backend:latest

    - name: Build and push frontend image
      uses: docker/build-push-action@v4
      with:
        context: frontend
        push: true
        tags: ghcr.io/${{ github.repository }}/frontend:latest

    - name: Deploy to Kubernetes
      run: |
        echo "Deploying to Kubernetes..."
        # This step requires configuring kubectl with cluster credentials
        # and applying the manifests from the /k8s directory.
        # Example:
        # kubectl apply -f k8s/
